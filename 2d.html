  document.body.appendChild(div);
  return false;

<script type="text/babel">

/* ============================================================
   DATA: Loaded via fetch() from data/kg_core.json + kg_views.json
   ============================================================ */
var KG = {};

(async function initKG() {
  try {
    var [core, views] = await Promise.all([
      fetch('data/kg_core.json').then(function(r){ if(!r.ok) throw new Error('kg_core.json: '+r.status); return r.json(); }),
      fetch('data/kg_views.json').then(function(r){ if(!r.ok) throw new Error('kg_views.json: '+r.status); return r.json(); }),

  } catch(e) {
    console.error('Failed to load KG data:', e);
    document.getElementById('root').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh"><div style="text-align:center;color:#f43f5e;font-family:DM Sans,sans-serif"><h2>Kunde inte ladda data</h2><p style="color:#64748b;margin-top:8px">Serve med HTTP-server: python3 -m http.server 8000</p></div></div>';
    return;
  }

  /* --- Derived: expanded merged nodes/edges + lookup --- */
  KG.nodes = KG.merged.n.map(function(d){return Object.assign({},d,{label:d.label||d.id,matched:(d.mf||[]).length>1,radius:d.type==="intl_partner"?Math.max(10,Math.min(24,6+Math.sqrt(d.proj||0)*3)):Math.max(5,Math.min(28,5+Math.sqrt((d.fund||0)+(d.rev||0)*0.1+(d.bp||0)*0.05)*2.2))});});
  KG.nodeMap = {};
  KG.nodes.forEach(function(n){KG.nodeMap[n.id]=n;});
  KG.edges = KG.merged.e.map(function(d){return{source:d.s,target:d.t,type:d.tp,weight:d.w,sl:d.sl,tl:d.tl};});

  function ccFlag(cc){if(!cc||cc.length!==2)return cc||"";return String.fromCodePoint(0x1F1E6+cc.charCodeAt(0)-65)+String.fromCodePoint(0x1F1E6+cc.charCodeAt(1)-65);}
  
  /* --- Derived: Industry view uses v4n/v4e (Swedish entities only, no intl partners) --- */
  KG.indN = KG.v4n.map(function(n){return{id:n.id,label:n.label||n.id,type:n.type,domain:n.domain||'',revSE:n.rev||0,empSE:n.emp||0,vinnovaFunding:n.funding||0,vinnovaProjects:n.sources||0,heFunding:n.heFunding||0,heCount:0,heContrib:0,heProjects:[],esaBIC:false,esaHub:null,desc:n.desc||''};});
  KG.indE = KG.v4e.map(function(e){return{source:e.s,target:e.t,type:e.tp,weight:e.w||1};});
  
  /* --- Backward-compatible aliases (used by view components) --- */

  var domKeys = KG.domKeys;
  
  var {useState,useEffect,useRef,useMemo,useCallback} = React;
  
  /* ============================================================
     SHARED: 8-domain meta + helpers
     ============================================================ */
  /* ============================================================
     VIEW 1 DATA: Thematic keyword graph (40 themes, 8 domains)
     ============================================================ */
  /* ============================================================
     VIEW 2 DATA: Institutional graph (23 swe + 45 intl)
     ============================================================ */
  /* ============================================================
     VIEW 3 DATA: Researcher co-authorship graph (v2 â€šÂ¢â€™ all 6121 papers)
     150 researchers, stratified across 8 domains
     Co-authorship from Semantic Scholar (5,693 papers, 96% coverage)
     ============================================================ */
  
  // === National funding data (Vinnova, Rymdstyrelsen) ===
  (function(){
  var nf=KG.nf,sweInst=KG.sweInst,intlInst=KG.intlInst;
  for(var k in nf){if(sweInst[k]){sweInst[k].natFunding=nf[k].f;sweInst[k].natProjects=nf[k].p;sweInst[k].natSources=nf[k].s;}}
  for(var k in sweInst){if(!sweInst[k].natFunding&&sweInst[k].natFunding!==0){sweInst[k].natFunding=0;sweInst[k].natProjects=0;sweInst[k].natSources=[];}}
  for(var k in intlInst){if(!intlInst[k].natFunding){intlInst[k].natFunding=0;intlInst[k].natProjects=0;intlInst[k].natSources=[];}}
  })();
  
  function instColor(i){return KG.instColors[i]||"#64748b";}
  
  
  
  /* VIEW 4 DATA: System graph â€šÂ¢â€™ all >=5p researchers (deduped) */

  /* ============================================================

        .attr("font-size",function(d){return d.r>35?9.5:8;}).attr("font-weight",600).attr("font-family","DM Sans, sans-serif").text(function(d){return d.label;});

      node.on("click",function(e,d){e.stopPropagation();setSelected(function(p){return p&&p.id===d.id?null:d;});});
