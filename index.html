<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Svenskt rymdekosystem — Kunskapsgraf</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#080c18;font-family:'DM Sans',-apple-system,sans-serif;color:#e2e8f0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0b1022}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}

#topbar{background:#0b1022;padding:10px 14px 0;flex-shrink:0}
#topbar-brand{display:flex;align-items:center;gap:10px;margin-bottom:8px}
#topbar-accent{width:4px;height:32px;background:linear-gradient(180deg,#a855f7,#06b6d4,#ec4899,#22c55e,#14b8a6,#f97316);border-radius:2px;flex-shrink:0}
#topbar h1{margin:0;font-size:15px;font-weight:700;color:#f1f5f9;letter-spacing:-0.01em}
#topbar .sub{margin:2px 0 0;font-size:9px;color:#475569}

#tabs{display:flex;gap:0;border-bottom:1px solid #1a2036}
.tab{background:transparent;border:1px solid transparent;border-bottom:1px solid #1a2036;border-radius:6px 6px 0 0;padding:6px 14px 5px;cursor:pointer;color:#64748b;font-size:10px;font-weight:400;margin-bottom:-1px;position:relative;z-index:1;font-family:inherit;text-align:left;transition:color 0.15s}
.tab:hover{color:#94a3b8}
.tab.on{background:#080c18;border:1px solid #1a2036;border-bottom:1px solid #080c18;color:#f1f5f9;font-weight:600;z-index:2}
.tab .tab-sub{display:block;font-size:7px;color:#475569;font-weight:400;margin-top:1px}

/* Mode toggle */
#mode-toggle{display:flex;gap:0;background:#0f172a;border-radius:6px;border:1px solid #1e293b;overflow:hidden;flex-shrink:0}
#mode-toggle button{padding:4px 12px;font-size:10px;font-weight:500;font-family:inherit;border:none;cursor:pointer;color:#64748b;background:transparent;transition:all 0.15s}
#mode-toggle button.on{background:#3b82f6;color:#fff}
#mode-toggle button:hover:not(.on){color:#94a3b8}

#frame-wrap{flex:1;position:relative}
#frame-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:#080c18}
</style>
</head>
<body style="display:flex;flex-direction:column;height:100vh">

<div id="topbar">
  <div id="topbar-brand">
    <div id="topbar-accent"></div>
    <div style="flex:1">
      <h1>Svenskt rymdekosystem — Kunskapsgraf</h1>
      <div class="sub">Neo4j KG · 7 vyer · Forskning + Industri + Finansiering</div>
    </div>
    <div id="mode-toggle">
      <button id="btn2d" class="on" onclick="setMode('2d')">2D</button>
      <button id="btn3d" onclick="setMode('3d')">3D</button>
    </div>
  </div>
  <div id="tabs"></div>
</div>

<div id="frame-wrap">
  <iframe id="frame2d" src="2d.html"></iframe>
  <iframe id="frame3d" src="3d.html" style="display:none"></iframe>
</div>

<script>
var viewNames=[
  ['Tematisk graf','40 teman i 8 domäner'],
  ['Institutionsgraf','Svenska + internationella'],
  ['Forskargraf','160 forskare'],
  ['Systemgraf','Institutioner + forskare'],
  ['Industri','200 aktörer · Klicka legend'],
  ['Intl. samarbete','HE CORDIS · 40+ länder'],
  ['Samarbetsnätverk','Alla samarbetslänkar']
];

var currentView=0;
var currentMode='2d';

/* Build tabs */
(function(){
  var el=document.getElementById('tabs');
  viewNames.forEach(function(v,i){
    var t=document.createElement('button');
    t.className='tab'+(i===0?' on':'');
    t.innerHTML='<span>'+v[0]+'</span><span class="tab-sub">'+v[1]+'</span>';
    t.onclick=function(){ switchView(i); };
    el.appendChild(t);
  });
})();

function switchView(idx){
  currentView=idx;
  document.querySelectorAll('.tab').forEach(function(t,i){t.className=i===idx?'tab on':'tab';});
  var frame=currentMode==='3d'?document.getElementById('frame3d'):document.getElementById('frame2d');
  frame.contentWindow.postMessage({viewIndex:idx},'*');
}

function setMode(mode){
  if(mode===currentMode)return;
  currentMode=mode;
  var f2d=document.getElementById('frame2d');
  var f3d=document.getElementById('frame3d');
  document.getElementById('btn2d').className=mode==='2d'?'on':'';
  document.getElementById('btn3d').className=mode==='3d'?'on':'';
  if(mode==='3d'){
    f2d.style.display='none';
    f3d.style.display='';
    setTimeout(function(){f3d.contentWindow.postMessage({viewIndex:currentView},'*');},150);
  } else {
    f3d.style.display='none';
    f2d.style.display='';
    setTimeout(function(){f2d.contentWindow.postMessage({viewIndex:currentView},'*');},50);
  }
}
</script>
</body>
</html>
